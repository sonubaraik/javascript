<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator App</h1>
    Enter Number: <input type="number" id="num1" /> <br><br>
    Enter Number: <input type="number" id="num2" /> <br><br>
    Choose Your Operator: <select id="op">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>
    <br><br>
    Result: <input type="number" id="result" readonly /> <br><br>
    <button onclick="calculate()">Calculate</button>

    <script>
        function calculate(){
        const num1=Number(document.querySelector("#num1").value);
        const num2=Number(document.querySelector("#num2").value);
        const op=document.querySelector("#op").value;
        let result;
        switch(op){
            case "+":
            result=num1+num2;
            break;
            case "-":
            result=num1-num2;
            break;
            case "*":
            result=num1*num2;
            break;
            case "/":
            result=num1/num2;
            break;
        }
        const showResult=document.querySelector("#result");
        showResult.value=result;
        }
    </script>
</body>
</html>
