<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
</head>
<body>
    <h1 id="timer"></h1>
    <h2 id="timeUp"></h2>
    <button id="strtBtn">Start</button>
    <script>
        
        const timer=document.getElementById("timer");
        const button=document.getElementById("strtBtn");
        const timeUp=document.getElementById("timeUp");
        let count=10;
        button.addEventListener("click",()=>{
            setInterval(()=>{
                if(count>=0){
                timer.innerText=count;
                count--;
                }else{
                    timeUp.innerText="Times Up!"
                }
            },1000)
            
        })
    </script>
</body>
</html>
